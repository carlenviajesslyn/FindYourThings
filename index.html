
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FindYourThings | Detektif Barang Hilang</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@400;500;600&family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'fyt-blue': '#bae6fd',      /* Light Blue (Tenang) */
                        'fyt-blue-dark': '#38bdf8', /* Main Blue */
                        'fyt-yellow': '#fde047',    /* Yellow Accent */
                        'fyt-yellow-dark': '#eab308'
                    },
                    fontFamily: {
                        'title': ['Quicksand', 'sans-serif'],
                        'body': ['Inter', 'sans-serif'],
                        'code': ['"Courier Prime"', 'monospace']
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { background-color: #f8fafc; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #bae6fd; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #38bdf8; }
    </style>
</head>
<body class="font-body text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- MOCK DATA ---
        const initialItems = [
            {
                id: 1,
                caseCode: 'CASE-001A',
                type: 'lost', // 'lost' atau 'found'
                title: 'Dompet Hitam Kulit',
                description: 'Dompet lipat warna hitam, ada stiker band rock di ujungnya. Berisi kartu pelajar dan uang jajan.',
                category: 'Aksesoris',
                location: 'Kantin Sekolah',
                date: '2023-10-25',
                status: 'open', // 'open' atau 'solved'
                image: 'https://images.unsplash.com/photo-1627123424574-724758594e93?auto=format&fit=crop&q=80&w=400',
                finderName: 'Budi (Kelas 11A)',
                verificationQuestion: '',
                verificationAnswer: ''
            },
            {
                id: 2,
                caseCode: 'CASE-002B',
                type: 'found',
                title: 'Kunci Motor Honda',
                description: 'Ditemukan gantungan kunci motor dengan gantungan bentuk boneka beruang.',
                category: 'Kunci',
                location: 'Parkiran Utara',
                date: '2023-10-26',
                status: 'open',
                image: 'https://images.unsplash.com/photo-1582139329536-e7284fece509?auto=format&fit=crop&q=80&w=400',
                finderName: 'Pak Satpam',
                verificationQuestion: 'Apa warna boneka beruang pada gantungan kunci tersebut?',
                verificationAnswer: 'coklat'
            },
            {
                id: 3,
                caseCode: 'CASE-003C',
                type: 'lost',
                title: 'Tempat Pensil Smiggle',
                description: 'Tempat pensil warna biru muda bergambar luar angkasa. Sangat penting karena ada flashdisk tugas.',
                category: 'Alat Tulis',
                location: 'Perpustakaan',
                date: '2023-10-27',
                status: 'solved',
                image: 'https://images.unsplash.com/photo-1583485088034-697b5bc54ccd?auto=format&fit=crop&q=80&w=400',
                finderName: 'Siti (Kelas 10B)',
                verificationQuestion: '',
                verificationAnswer: ''
            }
        ];

        // --- COMPONENTS ---

        const App = () => {
            const [items, setItems] = useState(initialItems);
            const [currentView, setCurrentView] = useState('board'); // 'board', 'report', 'detail'
            const [selectedItemId, setSelectedItemId] = useState(null);

            const navigate = (view, id = null) => {
                setCurrentView(view);
                setSelectedItemId(id);
                window.scrollTo(0, 0);
            };

            const handleAddItem = (newItem) => {
                setItems([newItem, ...items]);
                navigate('board');
            };

            const handleSolveCase = (id) => {
                setItems(items.map(item => item.id === id ? { ...item, status: 'solved' } : item));
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <header className="bg-white shadow-sm sticky top-0 z-50">
                        <div className="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
                            <div 
                                className="flex items-center gap-3 cursor-pointer group"
                                onClick={() => navigate('board')}
                            >
                                <div className="bg-fyt-blue-dark text-white w-10 h-10 rounded-full flex items-center justify-center text-xl shadow-md group-hover:scale-105 transition">
                                    <i className="fa-solid fa-paw"></i>
                                </div>
                                <div>
                                    <h1 className="font-title text-2xl text-fyt-blue-dark leading-none">FindYourThings</h1>
                                    <span className="text-xs text-gray-500 font-body">by Dexter 🕵️‍♂️🐶</span>
                                </div>
                            </div>
                            <nav className="flex gap-2 sm:gap-4">
                                <button 
                                    onClick={() => navigate('board')}
                                    className={`px-4 py-2 rounded-full font-title font-bold transition ${currentView === 'board' ? 'bg-fyt-blue text-fyt-blue-dark' : 'text-gray-500 hover:bg-gray-100'}`}
                                >
                                    <i className="fa-solid fa-magnifying-glass mr-2"></i>Board
                                </button>
                                <button 
                                    onClick={() => navigate('report')}
                                    className={`px-4 py-2 rounded-full font-title font-bold transition ${currentView === 'report' ? 'bg-fyt-yellow text-yellow-800' : 'bg-fyt-blue-dark text-white hover:bg-blue-500'}`}
                                >
                                    <i className="fa-solid fa-bullhorn mr-2"></i>Lapor
                                </button>
                            </nav>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="flex-grow p-4 md:p-8 max-w-6xl mx-auto w-full">
                        {currentView === 'board' && <DetectivesBoard items={items} onNavigate={navigate} />}
                        {currentView === 'report' && <ReportForm onAdd={handleAddItem} onCancel={() => navigate('board')} />}
                        {currentView === 'detail' && (
                            <ItemDetail 
                                item={items.find(i => i.id === selectedItemId)} 
                                onBack={() => navigate('board')} 
                                onSolve={handleSolveCase}
                            />
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="bg-white border-t py-6 text-center text-gray-500 font-body text-sm mt-auto">
                        <p>🐾 FindYourThings - Helpful Community Assistant &copy; 2026</p>
                        <p className="text-xs mt-1">Jangan panik, Dexter siap melacak barangmu!</p>
                    </footer>
                </div>
            );
        };

        // --- 1. Detective's Board & Sniff Out ---
        const DetectivesBoard = ({ items, onNavigate }) => {
            const [searchQuery, setSearchQuery] = useState('');
            const [filterType, setFilterType] = useState('all');
            const [filterCategory, setFilterCategory] = useState('all');

            const filteredItems = items.filter(item => {
                const matchesSearch = item.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                      item.description.toLowerCase().includes(searchQuery.toLowerCase()) ||
                                      item.caseCode.toLowerCase().includes(searchQuery.toLowerCase());
                const matchesType = filterType === 'all' || item.type === filterType;
                const matchesCategory = filterCategory === 'all' || item.category === filterCategory;
                return matchesSearch && matchesType && matchesCategory;
            });

            const openCasesCount = items.filter(i => i.status === 'open').length;

            return (
                <div className="space-y-8 animate-fade-in">
                    {/* Welcome Banner */}
                    <div className="bg-gradient-to-r from-fyt-blue to-white rounded-3xl p-6 md:p-10 shadow-sm flex flex-col md:flex-row items-center gap-6">
                        <div className="w-32 h-32 md:w-40 md:h-40 bg-white rounded-full flex items-center justify-center text-6xl shadow-inner border-4 border-white flex-shrink-0 relative">
                            🐶
                            <div className="absolute -top-2 -right-2 text-4xl transform rotate-12">🕵️‍♂️</div>
                        </div>
                        <div>
                            <h2 className="font-title text-3xl md:text-4xl text-fyt-blue-dark mb-2">Papan Detektif Dexter</h2>
                            <p className="text-gray-600 text-lg mb-4">
                                Guk! Ada <strong className="text-fyt-yellow-dark">{openCasesCount} kasus</strong> barang hilang/ditemukan yang belum terpecahkan. Ayo bantu teman kita mengembalikan barang mereka ke pemilik aslinya!
                            </p>
                        </div>
                    </div>

                    {/* Sniff Out (Search & Filter) */}
                    <div className="glass-panel p-4 md:p-6 rounded-2xl shadow-sm">
                        <h3 className="font-title text-xl mb-4 flex items-center gap-2 text-gray-700">
                            <i className="fa-solid fa-dog"></i> Sniff Out (Pencarian Cepat)
                        </h3>
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                            <div className="md:col-span-2 relative">
                                <i className="fa-solid fa-search absolute left-4 top-3.5 text-gray-400"></i>
                                <input 
                                    type="text" 
                                    placeholder="Endus nama barang, deskripsi, atau KODE KASUS..."
                                    className="w-full pl-11 pr-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-fyt-blue-dark focus:border-transparent"
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                />
                            </div>
                            <select 
                                className="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-fyt-blue-dark appearance-none bg-white"
                                value={filterType}
                                onChange={(e) => setFilterType(e.target.value)}
                            >
                                <option value="all">Semua Laporan</option>
                                <option value="lost">Barang Hilang (Dicari)</option>
                                <option value="found">Barang Ditemukan (Menunggu Pemilik)</option>
                            </select>
                            <select 
                                className="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-fyt-blue-dark appearance-none bg-white"
                                value={filterCategory}
                                onChange={(e) => setFilterCategory(e.target.value)}
                            >
                                <option value="all">Semua Kategori</option>
                                <option value="Alat Tulis">Alat Tulis</option>
                                <option value="Elektronik">Elektronik</option>
                                <option value="Aksesoris">Aksesoris</option>
                                <option value="Kunci">Kunci</option>
                                <option value="Lainnya">Lainnya</option>
                            </select>
                        </div>
                    </div>

                    {/* Grid Laporan */}
                    {filteredItems.length === 0 ? (
                        <div className="text-center py-12">
                            <div className="text-5xl mb-4 opacity-50">🐾</div>
                            <h3 className="font-title text-2xl text-gray-400">Tidak ada jejak yang ditemukan.</h3>
                            <p className="text-gray-400">Coba kata kunci atau filter yang lain.</p>
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                            {filteredItems.map(item => (
                                <ItemCard key={item.id} item={item} onClick={() => onNavigate('detail', item.id)} />
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const ItemCard = ({ item, onClick }) => {
            const isSolved = item.status === 'solved';
            const badgeConfig = {
                lost: { bg: 'bg-red-100', text: 'text-red-600', icon: 'fa-search', label: 'Dicari (Hilang)' },
                found: { bg: 'bg-green-100', text: 'text-green-600', icon: 'fa-hand-holding-heart', label: 'Ditemukan' }
            };
            const badge = badgeConfig[item.type];

            return (
                <div 
                    onClick={onClick}
                    className={`bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-lg transition-all duration-300 cursor-pointer border border-gray-100 group flex flex-col h-full ${isSolved ? 'opacity-70' : ''}`}
                >
                    <div className="h-48 overflow-hidden relative">
                        <img 
                            src={item.image} 
                            alt={item.title} 
                            className={`w-full h-full object-cover group-hover:scale-105 transition-transform duration-500 ${isSolved ? 'grayscale' : ''}`}
                            onError={(e) => {
                                e.target.onerror = null; 
                                e.target.src = 'https://images.unsplash.com/photo-1586769852044-692d6e3703f0?auto=format&fit=crop&q=80&w=400';
                            }}
                        />
                        {isSolved && (
                            <div className="absolute inset-0 bg-black bg-opacity-40 flex flex-col items-center justify-center">
                                <span className="bg-fyt-yellow text-yellow-900 font-title font-bold px-4 py-2 rounded-full transform -rotate-12 text-lg shadow-lg">
                                    <i className="fa-solid fa-check-circle mr-2"></i> CASE SOLVED!
                                </span>
                            </div>
                        )}
                        <div className="absolute top-3 right-3 flex flex-col gap-2">
                            <span className={`${badge.bg} ${badge.text} font-title text-xs px-3 py-1 rounded-full shadow-sm flex items-center gap-1`}>
                                <i className={`fa-solid ${badge.icon}`}></i> {badge.label}
                            </span>
                        </div>
                        <div className="absolute bottom-3 left-3">
                            <span className="bg-white/90 backdrop-blur-sm text-gray-800 font-code text-xs px-2 py-1 rounded shadow-sm font-bold border border-gray-200">
                                {item.caseCode}
                            </span>
                        </div>
                    </div>
                    <div className="p-5 flex flex-col flex-grow">
                        <div className="flex justify-between items-start mb-2">
                            <h3 className="font-title text-xl font-bold text-gray-800 line-clamp-1">{item.title}</h3>
                        </div>
                        <p className="text-sm text-gray-500 mb-4 flex-grow line-clamp-2">{item.description}</p>
                        
                        <div className="space-y-2 text-sm text-gray-600 mb-4 border-t pt-4">
                            <div className="flex items-center gap-2">
                                <i className="fa-solid fa-location-dot w-4 text-center text-fyt-blue-dark"></i>
                                <span className="truncate">{item.location}</span>
                            </div>
                            <div className="flex items-center gap-2">
                                <i className="fa-regular fa-calendar w-4 text-center text-fyt-blue-dark"></i>
                                <span>{item.date}</span>
                            </div>
                        </div>

                        <button className="w-full py-2 bg-gray-50 text-fyt-blue-dark font-title font-bold rounded-xl border border-gray-200 group-hover:bg-fyt-blue transition">
                            Lihat Berkas <i className="fa-solid fa-arrow-right ml-1"></i>
                        </button>
                    </div>
                </div>
            );
        };

        // --- 2. Lost & Found Reporting ---
        const ReportForm = ({ onAdd, onCancel }) => {
            const [formData, setFormData] = useState({
                type: 'lost',
                title: '',
                description: '',
                category: 'Alat Tulis',
                location: '',
                finderName: '',
                image: '',
                verificationQuestion: '',
                verificationAnswer: ''
            });

            const handleSubmit = (e) => {
                e.preventDefault();
                
                // Generate random case code
                const codeNumber = Math.floor(1000 + Math.random() * 9000);
                const randomLetter = String.fromCharCode(65 + Math.floor(Math.random() * 26));
                const newCaseCode = `CASE-${codeNumber}${randomLetter}`;

                const newItem = {
                    ...formData,
                    id: Date.now(),
                    caseCode: newCaseCode,
                    date: new Date().toISOString().split('T')[0],
                    status: 'open',
                    // Gunakan placeholder jika image kosong
                    image: formData.image || 'https://images.unsplash.com/photo-1586769852044-692d6e3703f0?auto=format&fit=crop&q=80&w=600'
                };
                
                onAdd(newItem);
            };

            return (
                <div className="max-w-2xl mx-auto bg-white rounded-3xl shadow-md overflow-hidden animate-fade-in">
                    <div className="bg-fyt-blue-dark p-6 text-white text-center relative">
                        <button onClick={onCancel} className="absolute left-6 top-6 text-white hover:text-fyt-yellow transition">
                            <i className="fa-solid fa-arrow-left text-xl"></i>
                        </button>
                        <h2 className="font-title text-2xl">Buat Laporan Baru</h2>
                        <p className="text-sm opacity-90 mt-1 font-body">Dexter akan mencatat setiap detail laporanmu.</p>
                    </div>

                    <form onSubmit={handleSubmit} className="p-6 md:p-8 space-y-6">
                        {/* Tipe Laporan */}
                        <div>
                            <label className="block text-sm font-semibold text-gray-700 mb-2">Saya ingin melaporkan...</label>
                            <div className="grid grid-cols-2 gap-4">
                                <label className={`border-2 rounded-xl p-4 cursor-pointer transition flex flex-col items-center gap-2 text-center ${formData.type === 'lost' ? 'border-red-400 bg-red-50 text-red-700' : 'border-gray-200 hover:bg-gray-50'}`}>
                                    <input type="radio" name="type" className="hidden" checked={formData.type === 'lost'} onChange={() => setFormData({...formData, type: 'lost'})} />
                                    <i className="fa-solid fa-search text-2xl"></i>
                                    <span className="font-title font-bold">Kehilangan Barang</span>
                                    <span className="text-xs text-gray-500">Barang saya hilang dan sedang saya cari.</span>
                                </label>
                                <label className={`border-2 rounded-xl p-4 cursor-pointer transition flex flex-col items-center gap-2 text-center ${formData.type === 'found' ? 'border-green-400 bg-green-50 text-green-700' : 'border-gray-200 hover:bg-gray-50'}`}>
                                    <input type="radio" name="type" className="hidden" checked={formData.type === 'found'} onChange={() => setFormData({...formData, type: 'found'})} />
                                    <i className="fa-solid fa-hand-holding-heart text-2xl"></i>
                                    <span className="font-title font-bold">Menemukan Barang</span>
                                    <span className="text-xs text-gray-500">Saya menemukan barang orang lain.</span>
                                </label>
                            </div>
                        </div>

                        {/* Info Dasar */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div className="md:col-span-2">
                                <label className="block text-sm font-semibold text-gray-700 mb-1">Nama Barang *</label>
                                <input required type="text" className="w-full p-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-fyt-blue-dark focus:outline-none" placeholder="Cth: Dompet Kulit Hitam" value={formData.title} onChange={e => setFormData({...formData, title: e.target.value})} />
                            </div>

                            <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-1">Kategori</label>
                                <select className="w-full p-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-fyt-blue-dark focus:outline-none bg-white" value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})}>
                                    <option>Alat Tulis</option>
                                    <option>Elektronik</option>
                                    <option>Aksesoris</option>
                                    <option>Kunci</option>
                                    <option>Dompet/Tas</option>
                                    <option>Lainnya</option>
                                </select>
                            </div>

                            <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-1">Lokasi Kejadian *</label>
                                <input required type="text" className="w-full p-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-fyt-blue-dark focus:outline-none" placeholder="Cth: Kantin, Lab Komputer" value={formData.location} onChange={e => setFormData({...formData, location: e.target.value})} />
                            </div>

                            <div className="md:col-span-2">
                                <label className="block text-sm font-semibold text-gray-700 mb-1">Deskripsi Detail *</label>
                                <textarea required rows="3" className="w-full p-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-fyt-blue-dark focus:outline-none" placeholder="Ceritakan ciri-ciri khusus, isi dompet, atau warna spesifik..." value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})}></textarea>
                            </div>

                            <div className="md:col-span-2">
                                <label className="block text-sm font-semibold text-gray-700 mb-1">URL Foto (Opsional)</label>
                                <input type="url" className="w-full p-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-fyt-blue-dark focus:outline-none text-sm" placeholder="https://link-gambar.com/foto.jpg" value={formData.image} onChange={e => setFormData({...formData, image: e.target.value})} />
                            </div>
                            
                            <div className="md:col-span-2">
                                <label className="block text-sm font-semibold text-gray-700 mb-1">Nama Pelapor *</label>
                                <input required type="text" className="w-full p-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-fyt-blue-dark focus:outline-none" placeholder="Nama Anda (dan Kelas/Divisi)" value={formData.finderName} onChange={e => setFormData({...formData, finderName: e.target.value})} />
                            </div>
                        </div>

                        {/* Verification System (Hanya jika menemukan barang) */}
                        {formData.type === 'found' && (
                            <div className="bg-fyt-yellow bg-opacity-20 border border-fyt-yellow rounded-xl p-5 mt-6">
                                <h3 className="font-title font-bold text-yellow-800 flex items-center gap-2 mb-2">
                                    <i className="fa-solid fa-shield-halved"></i> Sistem Verifikasi (Keamanan)
                                </h3>
                                <p className="text-sm text-yellow-900 mb-4">Buat satu pertanyaan rahasia yang hanya diketahui oleh pemilik asli barang ini. (Cth: Apa isi kantong kecil di dalam dompet? / Apa warna casing dalamnya?)</p>
                                
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-semibold text-yellow-900 mb-1">Pertanyaan Verifikasi *</label>
                                        <input required type="text" className="w-full p-3 rounded-xl border border-yellow-300 focus:ring-2 focus:ring-yellow-500 focus:outline-none" placeholder="Cth: Apa merek flashdisk di dalam kotak pensil?" value={formData.verificationQuestion} onChange={e => setFormData({...formData, verificationQuestion: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-semibold text-yellow-900 mb-1">Kunci Jawaban Singkat *</label>
                                        <input required type="text" className="w-full p-3 rounded-xl border border-yellow-300 focus:ring-2 focus:ring-yellow-500 focus:outline-none" placeholder="Cth: sandisk / merah" value={formData.verificationAnswer} onChange={e => setFormData({...formData, verificationAnswer: e.target.value})} />
                                    </div>
                                </div>
                            </div>
                        )}

                        <div className="pt-4 flex gap-4">
                            <button type="button" onClick={onCancel} className="w-1/3 py-3 rounded-xl font-title font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 transition">
                                Batal
                            </button>
                            <button type="submit" className="w-2/3 py-3 rounded-xl font-title font-bold text-white bg-fyt-blue-dark hover:bg-blue-500 shadow-md transition flex justify-center items-center gap-2">
                                <i className="fa-solid fa-paper-plane"></i> Ajukan Laporan
                            </button>
                        </div>
                    </form>
                </div>
            );
        };

        // --- 3 & 4. Verification System & Case Solved Detail ---
        const ItemDetail = ({ item, onBack, onSolve }) => {
            const [answerInput, setAnswerInput] = useState('');
            const [verificationStatus, setVerificationStatus] = useState('idle'); // idle, correct, wrong
            
            if (!item) return null;

            const isSolved = item.status === 'solved';

            const handleVerify = () => {
                // Pengecekan jawaban sederhana (case insensitive, trim)
                const userAns = answerInput.toLowerCase().trim();
                const correctAns = item.verificationAnswer.toLowerCase().trim();
                
                // Simple partial matching untuk toleransi
                if (userAns.includes(correctAns) || correctAns.includes(userAns)) {
                    setVerificationStatus('correct');
                } else {
                    setVerificationStatus('wrong');
                }
            };

            return (
                <div className="max-w-4xl mx-auto animate-fade-in">
                    <button onClick={onBack} className="mb-6 flex items-center gap-2 text-gray-500 hover:text-fyt-blue-dark transition font-title font-bold">
                        <i className="fa-solid fa-arrow-left"></i> Kembali ke Papan
                    </button>

                    <div className="bg-white rounded-3xl shadow-sm overflow-hidden border border-gray-100 flex flex-col md:flex-row">
                        {/* Kolom Kiri: Gambar */}
                        <div className="md:w-2/5 relative h-64 md:h-auto">
                            <img 
                                src={item.image} 
                                alt={item.title} 
                                className={`w-full h-full object-cover ${isSolved ? 'grayscale' : ''}`}
                            />
                            <div className="absolute top-4 left-4 bg-white/90 backdrop-blur-sm px-3 py-1 rounded shadow text-gray-800 font-code font-bold">
                                {item.caseCode}
                            </div>
                        </div>

                        {/* Kolom Kanan: Detail & Aksi */}
                        <div className="md:w-3/5 p-6 md:p-8 flex flex-col">
                            {/* Header Detail */}
                            <div className="flex flex-wrap items-center gap-3 mb-4">
                                <span className={`font-title text-sm px-3 py-1 rounded-full shadow-sm flex items-center gap-1 ${item.type === 'lost' ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}`}>
                                    <i className={`fa-solid ${item.type === 'lost' ? 'fa-search' : 'fa-hand-holding-heart'}`}></i>
                                    {item.type === 'lost' ? 'Dicari Pemiliknya' : 'Menunggu Pemilik'}
                                </span>
                                <span className="bg-gray-100 text-gray-600 font-title text-sm px-3 py-1 rounded-full">
                                    {item.category}
                                </span>
                                {isSolved && (
                                    <span className="bg-fyt-yellow text-yellow-900 font-title text-sm px-3 py-1 rounded-full font-bold">
                                        <i className="fa-solid fa-check-circle"></i> Selesai
                                    </span>
                                )}
                            </div>

                            <h1 className="font-title text-3xl font-bold text-gray-800 mb-2">{item.title}</h1>
                            
                            <div className="text-gray-600 text-sm flex flex-wrap gap-x-6 gap-y-2 mb-6 border-b pb-6">
                                <span className="flex items-center gap-2"><i className="fa-solid fa-location-dot text-fyt-blue-dark"></i> {item.location}</span>
                                <span className="flex items-center gap-2"><i className="fa-solid fa-calendar text-fyt-blue-dark"></i> {item.date}</span>
                                <span className="flex items-center gap-2"><i className="fa-solid fa-user text-fyt-blue-dark"></i> Pelapor: {item.finderName}</span>
                            </div>

                            <div className="mb-8">
                                <h3 className="font-title font-bold text-lg mb-2">Deskripsi Detail</h3>
                                <p className="text-gray-700 leading-relaxed">{item.description}</p>
                            </div>

                            <div className="mt-auto">
                                {isSolved ? (
                                    <div className="bg-green-50 border border-green-200 rounded-2xl p-6 text-center">
                                        <div className="text-4xl mb-2 text-green-500"><i className="fa-solid fa-check-circle"></i></div>
                                        <h3 className="font-title font-bold text-green-800 text-xl">Kasus Selesai!</h3>
                                        <p className="text-green-600 text-sm mt-1">Barang ini sudah kembali ke pemilik yang sah. Kerja bagus, tim!</p>
                                    </div>
                                ) : (
                                    <div className="space-y-4">
                                        {/* Jika ini barang 'found' dan butuh verifikasi */}
                                        {item.type === 'found' && item.verificationQuestion && verificationStatus !== 'correct' && (
                                            <div className="bg-blue-50 border border-blue-200 rounded-2xl p-5">
                                                <h3 className="font-title font-bold text-blue-900 mb-2 flex items-center gap-2">
                                                    <i className="fa-solid fa-lock"></i> Verifikasi Pemilik
                                                </h3>
                                                <p className="text-sm text-blue-800 mb-4 bg-white p-3 rounded-lg border border-blue-100 italic">
                                                    " {item.verificationQuestion} "
                                                </p>
                                                <div className="flex gap-2">
                                                    <input 
                                                        type="text" 
                                                        className="flex-grow p-3 rounded-xl border border-blue-200 focus:outline-none focus:ring-2 focus:ring-blue-400"
                                                        placeholder="Jawab untuk klaim barang..."
                                                        value={answerInput}
                                                        onChange={(e) => setAnswerInput(e.target.value)}
                                                    />
                                                    <button onClick={handleVerify} className="px-6 bg-fyt-blue-dark hover:bg-blue-500 text-white font-title font-bold rounded-xl transition shadow-md">
                                                        Klaim
                                                    </button>
                                                </div>
                                                {verificationStatus === 'wrong' && (
                                                    <p className="text-red-500 text-sm mt-2 flex items-center gap-1"><i className="fa-solid fa-circle-xmark"></i> Jawaban salah. Coba lagi!</p>
                                                )}
                                            </div>
                                        )}

                                        {/* Jika verifikasi berhasil */}
                                        {verificationStatus === 'correct' && (
                                            <div className="bg-green-50 border border-green-200 rounded-2xl p-5 animate-fade-in">
                                                <h3 className="font-title font-bold text-green-800 mb-2 flex items-center gap-2">
                                                    <i className="fa-solid fa-unlock-keyhole"></i> Verifikasi Berhasil!
                                                </h3>
                                                <p className="text-green-700 text-sm mb-4">Luar biasa! Anda berhasil memverifikasi kepemilikan. Silakan temui <strong>{item.finderName}</strong> untuk mengambil barang Anda.</p>
                                                <button onClick={() => onSolve(item.id)} className="w-full py-4 bg-fyt-yellow hover:bg-fyt-yellow-dark text-yellow-900 font-title font-bold text-lg rounded-xl transition shadow-lg flex justify-center items-center gap-2">
                                                    <i className="fa-solid fa-handshake"></i> Tandai "Case Solved!"
                                                </button>
                                            </div>
                                        )}

                                        {/* Jika ini barang 'lost', tampilkan tombol penemu */}
                                        {item.type === 'lost' && (
                                            <div className="flex flex-col sm:flex-row gap-3">
                                                <button className="flex-grow py-4 bg-gray-800 hover:bg-gray-900 text-white font-title font-bold rounded-xl transition shadow-md flex justify-center items-center gap-2">
                                                    <i className="fa-solid fa-comment-dots"></i> Saya Menemukannya!
                                                </button>
                                                <button onClick={() => onSolve(item.id)} className="flex-grow py-4 bg-fyt-yellow hover:bg-fyt-yellow-dark text-yellow-900 font-title font-bold rounded-xl transition shadow-md flex justify-center items-center gap-2">
                                                    <i className="fa-solid fa-check-double"></i> Barang Sudah Ketemu
                                                </button>
                                            </div>
                                        )}
                                        
                                        {/* Bypass Button for Demo if Found without questions or finder self-closing */}
                                        {item.type === 'found' && !item.verificationQuestion && (
                                             <button onClick={() => onSolve(item.id)} className="w-full py-4 bg-fyt-yellow hover:bg-fyt-yellow-dark text-yellow-900 font-title font-bold text-lg rounded-xl transition shadow-lg flex justify-center items-center gap-2">
                                                <i className="fa-solid fa-handshake"></i> Kembalikan & "Case Solved!"
                                            </button>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // Initialize React App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <style>
        /* Simple animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</body>
</html>
